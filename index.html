<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ArhiCore Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // --- AICI TREBUIE SA PUI CONFIGURAREA TA ---
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "arhi-core-chat.firebaseapp.com",
            projectId: "arhi-core-chat",
            storageBucket: "arhi-core-chat.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Functie trimitere
        window.sendMessage = async () => {
            const input = document.getElementById("messageInput");
            if (input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        };

        // Asculta mesajele in timp real
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatWindow = document.getElementById("chat-window");
            chatWindow.innerHTML = ""; // Curata ecranul
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const div = document.createElement("div");
                div.className = "message";
                div.textContent = msg.text;
                chatWindow.appendChild(div);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: #1a1a1a; border: 2px solid #8a2be2; border-radius: 15px; display: flex; flex-direction: column; padding: 20px; height: 80vh; margin-top: 50px; }
        h1 { text-align: center; color: #8a2be2; }
        #chat-window { flex: 1; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .message { margin-bottom: 10px; padding: 8px; background: #333; border-radius: 8px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #8a2be2; background: #000; color: #fff; }
        button { padding: 10px; background: #8a2be2; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>ArhiCore</h1>
        <div id="chat-window"></div>
        <input type="text" id="messageInput" placeholder="Mesajul tau...">
        <button onclick="sendMessage()">Trimite</button>
    </div>
</body>
</html>
