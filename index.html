<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #f4f4f9; 
        }
        .container { text-align: center; padding: 20px; border: 2px solid #333; border-radius: 10px; background: white; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Salut!</h1>
        <p>Acesta este un test pentru a verifica dacă totul funcționează.</p>
        <button id="testBtn">Apasă-mă!</button>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            alert('Codul funcționează perfect!');
        });
    </script>

</body>
</html>
