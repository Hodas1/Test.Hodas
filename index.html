<div id="game-container" style="text-align: center; margin-top: 20px; color: #fff;">
    <h3>Mini-Joc: ArhiClicker</h3>
    <p>Scor: <span id="score">0</span></p>
    <div id="game-area" style="width: 300px; height: 300px; border: 2px solid #8a2be2; margin: 0 auto; position: relative; background: #111;">
        <div id="target" style="width: 40px; height: 40px; background-color: #8a2be2; border-radius: 5px; position: absolute; cursor: pointer; top: 130px; left: 130px;"></div>
    </div>
</div>

<script>
    let score = 0;
    const target = document.getElementById("target");
    const scoreDisplay = document.getElementById("score");
    const gameArea = document.getElementById("game-area");

    target.addEventListener("click", () => {
        score++;
        scoreDisplay.textContent = score;

        // Mută pătratul într-o poziție aleatorie în interiorul game-area
        const maxX = gameArea.clientWidth - target.clientWidth;
        const maxY = gameArea.clientHeight - target.clientHeight;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        target.style.left = randomX + "px";
        target.style.top = randomY + "px";
    });
</script>
