<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ArhiCore - Black Mode</title>
    <style>
        /* Fundal Negru Total */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #d1d1d1; /* Gri deschis, NU alb */
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* Canvas pentru Hexagoane */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Splash Screen (Ecranul de Start) */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        #splash h1 { color: #8a2be2; border: 1px solid #8a2be2; padding: 20px; }

        /* Containerul principal (ascuns inițial) */
        #main-content {
            display: none;
            padding: 20px;
        }

        /* Elemente de UI (Fără alb, doar nuanțe de gri și mov) */
        .chat-container {
            width: 400px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #8a2be2;
            padding: 20px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="splash">
        <h1>APASĂ SPACE PENTRU A INTRA</h1>
    </div>

    <div id="main-content">
        <div class="chat-container">
            <h2 style="color: #8a2be2;">ArhiCore Terminal</h2>
            <p>Sistem activat. Pregătit pentru input.</p>
            </div>
    </div>

    <script>
        // 1. Logica pentru Start (Space)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        });

        // 2. Logica pentru Hexagoane pe fundal
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawHexagon(x, y, size) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + size * Math.cos(i * Math.PI / 3), y + size * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            ctx.strokeStyle = '#2e0059'; // Mov foarte închis pentru fundal
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Generare hexagoane random
        for(let i=0; i<30; i++) {
            drawHexagon(
                Math.random() * canvas.width, 
                Math.random() * canvas.height, 
                30 + Math.random() * 50
            );
        }
    </script>
</body>
</html>
