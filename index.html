<div id="game-box" style="margin-top: 30px; text-align: center;">
    <h3>ArhiDino (Apasă pe ecran pentru a sări)</h3>
    <div id="game" onclick="jump()" style="width: 500px; height: 150px; border: 2px solid #8a2be2; margin: 0 auto; overflow: hidden; background: #000; position: relative; cursor: pointer;">
        <div id="dino" style="width: 40px; height: 40px; background: #8a2be2; position: absolute; bottom: 0; left: 50px; border-radius: 5px;"></div>
        <div id="cactus" style="width: 20px; height: 40px; background: #fff; position: absolute; bottom: 0; left: 580px; animation: cactusMove 1.5s infinite linear;"></div>
    </div>
</div>

<style>
    @keyframes cactusMove {
        0% { left: 580px; }
        100% { left: -20px; }
    }
    .animate-jump { animation: jump 0.5s linear; }
    @keyframes jump {
        0% { bottom: 0; }
        30% { bottom: 80px; }
        70% { bottom: 80px; }
        100% { bottom: 0; }
    }
</style>

<script>
    var dino = document.getElementById("dino");
    var cactus = document.getElementById("cactus");

    function jump() {
        if (!dino.classList.contains("animate-jump")) {
            dino.classList.add("animate-jump");
            setTimeout(function() { dino.classList.remove("animate-jump"); }, 500);
        }
    }

    // Verificarea coliziunii la fiecare 10ms
    var checkDead = setInterval(function() {
        let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
        let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

        // Dacă cactusul este aproape și dinozaurul e jos
        if (cactusLeft < 90 && cactusLeft > 50 && dinoTop >= 110) {
            alert("Game Over! ArhiCore a fost oprit.");
            cactus.style.animation = "none";
            cactus.style.display = "none";
            location.reload(); // Reîncarcă pagina pentru a reporni
        }
    }, 10);
</script>
